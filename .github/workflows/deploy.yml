name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.windogs.win
          username: andy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/repos/fmm
            git pull origin main
            docker compose down
            docker compose up -d --build